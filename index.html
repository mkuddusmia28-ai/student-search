<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Search System</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#e3f2fd,#ffffff);
}

.container{
    max-width:500px;
    margin:60px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.15);
}

h2{
    text-align:center;
    color:#1565c0;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#1565c0;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#0d47a1;
}

.card{
    margin-top:20px;
    padding:15px;
    border-left:5px solid #1565c0;
    background:#f5f9ff;
    border-radius:8px;
}

.notfound{
    color:red;
    text-align:center;
    margin-top:15px;
}

.loading{
    text-align:center;
    color:#1565c0;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="container">
    <h2>রেজিস্ট্রেশন সার্চ</h2>

    <input type="text" id="reg" placeholder="রেজিস্ট্রেশন নাম্বার লিখুন">
    <button onclick="searchData()">সার্চ</button>

    <div id="result"></div>
</div>

<script>

// তোমার GitHub CSV লিংক
const CSV_URL = "https://raw.githubusercontent.com/mkuddusmia28-ai/student-search/refs/heads/main/students.csv";

let students = [];

// CSV লোড করা
document.getElementById("result").innerHTML = "<div class='loading'>ডেটা লোড হচ্ছে...</div>";

fetch(CSV_URL)
.then(res => res.text())
.then(data => {

    let rows = data.trim().split("\n");

    for(let i=1;i<rows.length;i++){
        let cols = rows[i].split(",");

        if(cols.length >= 5){
            students.push({
                reg: cols[0].trim(),
                roll: cols[1].trim(),
                name: cols[2].trim(),
                session: cols[3].trim(),
                group: cols[4].trim(),
                optional: cols[5] ? cols[5].trim() : ""
            });
        }
    }

    document.getElementById("result").innerHTML = "";
})
.catch(err => {
    document.getElementById("result").innerHTML =
    "<div class='notfound'>❌ ডেটা লোড হয়নি</div>";
});

function searchData(){

    let reg = document.getElementById("reg").value.trim();
    let result = document.getElementById("result");

    let student = students.find(s => s.reg === reg);

    if(student){
        result.innerHTML = `
        <div class="card">
            <h3>তথ্য পাওয়া গেছে</h3>
            <p><b>রেজিস্ট্রেশন:</b> ${student.reg}</p>
            <p><b>রোল:</b> ${student.roll}</p>
            <p><b>নাম:</b> ${student.name}</p>
            <p><b>সেশন:</b> ${student.session}</p>
            <p><b>গ্রুপ:</b> ${student.group}</p>
            <p><b>ঐচ্ছিক:</b> ${student.optional}</p>
        </div>`;
    }
    else{
        result.innerHTML = `<div class="notfound">❌ তথ্য পাওয়া যায়নি</div>`;
    }
}

</script>

</body>
</html>
