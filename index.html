<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Student Search</title>

<style>
body{
    font-family: Arial;
    background:#eef3ff;
}

.container{
    max-width:500px;
    margin:50px auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.15);
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#1565c0;
    color:#fff;
    border:none;
    cursor:pointer;
}

.card{
    margin-top:20px;
    background:#f7fbff;
    padding:15px;
    border-left:5px solid #1565c0;
}
</style>
</head>

<body>

<div class="container">

<h2>রেজিস্ট্রেশন সার্চ</h2>

<input id="reg" placeholder="রেজিস্ট্রেশন নম্বর লিখুন">
<button onclick="searchStudent()">Search</button>

<div id="result"></div>

</div>

<script>

let students = [];

// 🔥 GitHub CSV link
const url = "https://raw.githubusercontent.com/mkuddusmia28-ai/student-search/refs/heads/main/students.csv";

// CSV load
fetch(url)
.then(res => res.text())
.then(data => {

    const rows = data.split("\n").map(r => r.split(","));

    const headers = rows[0].map(h => h.trim());

    for(let i=1;i<rows.length;i++){
        let obj = {};
        rows[i].forEach((val, index)=>{
            obj[headers[index]] = val;
        });
        students.push(obj);
    }

});

function searchStudent(){

    let reg = document.getElementById("reg").value.trim();
    let result = document.getElementById("result");

    let found = students.find(s => s["REG NO"] === reg);

    if(found){
        result.innerHTML = `
        <div class="card">
            <p><b>SL:</b> ${found["SL"]}</p>
            <p><b>ROLL:</b> ${found["ROLL SEX"]}</p>
            <p><b>REG NO:</b> ${found["REG NO"]}</p>
            <p><b>NAME:</b> ${found["CANDIDATE'S NAME"]}</p>
            <p><b>SESSION:</b> ${found["SESSION"]}</p>
            <p><b>GROUP:</b> ${found["GROUP TYPE"]}</p>
            <p><b>SUBJECT:</b> ${found["SUBJECT"]}</p>
            <p><b>OPTIONAL:</b> ${found["OPTIONAL"]}</p>
        </div>`;
    }
    else{
        result.innerHTML = "<p style='color:red'>❌ তথ্য পাওয়া যায়নি</p>";
    }
}

</script>

</body>
</html>
