<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Student Search</title>
<style>
body{
    font-family: Arial;
    background:#eef4ff;
    margin:0;
}

.container{
    max-width:500px;
    margin:60px auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
}

button{
    background:#1565c0;
    color:white;
    border:none;
    cursor:pointer;
}

.card{
    margin-top:20px;
    padding:15px;
    border-left:5px solid #1565c0;
    background:#f5f9ff;
}
</style>
</head>

<body>

<div class="container">
<h2>REG NO Search</h2>

<input type="text" id="reg" placeholder="REG NO লিখুন">
<button onclick="search()">Search</button>

<div id="result"></div>
</div>

<script>

const CSV_URL = "https://raw.githubusercontent.com/mkuddusmia28-ai/student-search/refs/heads/main/students.csv";

let students = [];

fetch(CSV_URL)
.then(res => res.text())
.then(data => {

    let rows = data.trim().split("\n");

    for(let i=1;i<rows.length;i++){

        // 🔥 multiple spaces + tabs fix
        let cols = rows[i].split(/\s+/);

        students.push({
            sl: cols[0],
            roll: cols[1],
            sex: cols[2],
            reg: cols[3],
            session: cols[4],
            name: cols[5],
            group: cols[6],
            subject: cols[7],
            optional: cols[8]
        });
    }
});

function search(){

    let reg = document.getElementById("reg").value.trim();

    // 🔥 extra safe match
    let student = students.find(s => String(s.reg).trim() === reg);

    if(student){
        document.getElementById("result").innerHTML = `
        <div class="card">
            <p><b>SL:</b> ${student.sl}</p>
            <p><b>ROLL:</b> ${student.roll}</p>
            <p><b>REG:</b> ${student.reg}</p>
            <p><b>NAME:</b> ${student.name}</p>
            <p><b>SESSION:</b> ${student.session}</p>
            <p><b>GROUP:</b> ${student.group}</p>
        </div>`;
    }
    else{
        document.getElementById("result").innerHTML =
        "<p style='color:red'>❌ তথ্য পাওয়া যায়নি</p>";
    }
}

</script>

</body>
</html>
