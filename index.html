<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Student Search</title>

<style>
body{
    font-family: Arial;
    background:#eef4ff;
    margin:0;
}

.container{
    max-width:500px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,button{
    width:100%;
    padding:10px;
    margin-top:10px;
    font-size:16px;
}

button{
    background:#1565c0;
    color:white;
    border:none;
    cursor:pointer;
}

.card{
    margin-top:20px;
    background:#f5f9ff;
    padding:15px;
    border-left:5px solid #1565c0;
}
</style>
</head>

<body>

<div class="container">

<h2>রেজিস্ট্রেশন সার্চ</h2>

<input type="text" id="reg" placeholder="রেজিস্ট্রেশন নম্বর লিখুন">
<button onclick="search()">সার্চ</button>

<div id="result"></div>

</div>

<script>

let students = [];

// GitHub CSV লিংক
const url = "https://raw.githubusercontent.com/mkuddusmia28-ai/student-search/main/students.csv";

// CSV লোড করা
fetch(url)
.then(res => res.text())
.then(data => {

    let rows = data.split("\n");

    let headers = rows[0].split(",");

    for(let i=1;i<rows.length;i++){
        let cols = rows[i].split(",");

        students.push({
            sl: cols[0],
            roll: cols[1],
            sex: cols[2],
            reg: cols[3],
            session: cols[4],
            name: cols[5],
            group: cols[6],
            subject: cols[7],
            optional: cols[8]
        });
    }
});

function search(){

    let reg = document.getElementById("reg").value.trim();
    let result = document.getElementById("result");

    let found = students.find(s => s.reg === reg);

    if(found){
        result.innerHTML = `
        <div class="card">
            <p><b>রোল:</b> ${found.roll}</p>
            <p><b>নাম:</b> ${found.name}</p>
            <p><b>গ্রুপ:</b> ${found.group}</p>
            <p><b>সেশন:</b> ${found.session}</p>
            <p><b>ঐচ্ছিক:</b> ${found.optional}</p>
        </div>`;
    }
    else{
        result.innerHTML = `<p style="color:red;">❌ তথ্য পাওয়া যায়নি</p>`;
    }
}

</script>

</body>
</html>
