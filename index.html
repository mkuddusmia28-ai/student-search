<script>
let students = {};

fetch("students.csv")
.then(res => res.text())
.then(data => {
    let rows = data.split("\n");

    for(let i=1; i<rows.length; i++){
        let cols = rows[i].split(",");

        if(cols[0]){
            students[cols[0]] = {
                name: cols[1],
                session: cols[2],
                group: cols[3],
                subject: cols[4],
                optional: cols[5]
            };
        }
    }
});

function searchStudent(){
    let reg = document.getElementById("reg").value.trim();

    if(students[reg]){
        document.getElementById("result").innerHTML =
        `<div class="card">
        <h3>তথ্য পাওয়া গেছে</h3>
        <p><b>নাম:</b> ${students[reg].name}</p>
        <p><b>সেশন:</b> ${students[reg].session}</p>
        <p><b>গ্রুপ:</b> ${students[reg].group}</p>
        <p><b>বিষয়:</b> ${students[reg].subject}</p>
        <p><b>ঐচ্ছিক:</b> ${students[reg].optional}</p>
        </div>`;
    } else {
        document.getElementById("result").innerHTML =
        `<div class="notfound">❌ তথ্য পাওয়া যায়নি</div>`;
    }
}
</script>
