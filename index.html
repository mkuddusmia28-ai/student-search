<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>শিক্ষার্থী তথ্য অনুসন্ধান</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    text-align:center;
    padding:20px;
}
.container{
    max-width:600px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}
input{
    width:80%;
    padding:12px;
    font-size:16px;
}
button{
    padding:12px 20px;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}
#result{
    margin-top:20px;
    text-align:left;
}
table{
    width:100%;
    border-collapse:collapse;
}
td{
    border:1px solid #ddd;
    padding:8px;
}
</style>
</head>
<body>

<div class="container">
    <h2>রেজিস্ট্রেশন নম্বর দিয়ে তথ্য অনুসন্ধান</h2>

    <input type="text" id="regNo" placeholder="রেজিস্ট্রেশন নম্বর লিখুন">
    <br>
    <button onclick="searchStudent()">সার্চ</button>

    <div id="result"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>

const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT7K1Ch9iotaAolpOe0PZ003eZ3hl3SddFzm7Zz8si8N0uwQJnnOe6f9ywlmNtwhyi8aoHOLWDhACKc/pub?gid=0&single=true&output=csv";

async function searchStudent(){

    const regNo = document.getElementById("regNo").value.trim();

    if(!regNo){
        alert("রেজিস্ট্রেশন নম্বর লিখুন");
        return;
    }

    const response = await fetch(csvUrl);
    const csvText = await response.text();

    const data = Papa.parse(csvText,{
        header:true,
        skipEmptyLines:true
    }).data;

    const student = data.find(row =>
        String(row["REG NO"]).trim() === regNo
    );

    const result = document.getElementById("result");

    if(student){

        let html = "<table>";

        for(const key in student){
            html += `
            <tr>
                <td><b>${key}</b></td>
                <td>${student[key]}</td>
            </tr>`;
        }

        html += "</table>";

        result.innerHTML = html;

    }else{
        result.innerHTML = "<h3>কোন তথ্য পাওয়া যায়নি</h3>";
    }
}

</script>

</body>
</html>
