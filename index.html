<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Student Search</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#eef4ff;
    margin:0;
}

.container{
    max-width:500px;
    margin:60px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
}

button{
    background:#1565c0;
    color:white;
    border:none;
    cursor:pointer;
}

.card{
    margin-top:20px;
    padding:15px;
    border-left:5px solid #1565c0;
    background:#f5f9ff;
}
</style>
</head>

<body>

<div class="container">

<h2>REG NO Search</h2>

<input type="text" id="reg" placeholder="REG NO লিখুন">
<button onclick="search()">Search</button>

<div id="result"></div>

</div>

<script>

const CSV_URL = "https://raw.githubusercontent.com/mkuddusmia28-ai/student-search/refs/heads/main/students.csv";

let students = [];

// 🔥 PROPER CSV LOADER
Papa.parse(CSV_URL, {
    download: true,
    header: true,
    complete: function(results) {
        students = results.data;
        console.log("Loaded:", students);
    }
});

function search(){

    let reg = document.getElementById("reg").value.trim();

    let student = students.find(s => s["REG NO"] == reg);

    if(student){
        document.getElementById("result").innerHTML = `
        <div class="card">
            <p><b>SL:</b> ${student["SL"]}</p>
            <p><b>ROLL:</b> ${student["ROLL SEX"]}</p>
            <p><b>REG NO:</b> ${student["REG NO"]}</p>
            <p><b>NAME:</b> ${student["CANDIDATE'S NAME"]}</p>
            <p><b>SESSION:</b> ${student["SESSION"]}</p>
            <p><b>GROUP:</b> ${student["GROUP TYPE"]}</p>
            <p><b>SUBJECT:</b> ${student["SUBJECT"]}</p>
            <p><b>OPTIONAL:</b> ${student["OPTIONAL"]}</p>
        </div>`;
    }
    else{
        document.getElementById("result").innerHTML =
        "<p style='color:red'>❌ তথ্য পাওয়া যায়নি</p>";
    }
}

</script>

</body>
</html>
