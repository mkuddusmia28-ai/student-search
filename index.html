<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Search</title>

<style>
body {
    font-family: Arial;
    margin: 20px;
}

h2 {
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    font-size: 16px;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
}

th, td {
    border: 1px solid #000;
    padding: 5px;
    text-align: center;
}

th {
    background: #f2f2f2;
}
</style>
</head>

<body>

<h2>Student Search (By Registration No)</h2>

<input type="text" id="searchBox" placeholder="Enter Registration Number..." onkeyup="searchTable()">

<table id="studentTable">
<tr>
<th>SL</th>
<th>ROLL</th>
<th>REG NO</th>
<th>SESSION</th>
<th>NAME</th>
<th>GROUP</th>
<th>OPTIONAL</th>
</tr>

<tr>
<td>1</td>
<td>160562</td>
<td>2110873134</td>
<td>2024-25</td>
<td>SANJIDA AKTER MIM</td>
<td>SCIENCE</td>
<td>HIGHER MATHEMATICS</td>
</tr>

<tr>
<td>2</td>
<td>160563</td>
<td>2110926474</td>
<td>2024-25</td>
<td>JERIN AKTER</td>
<td>SCIENCE</td>
<td>HIGHER MATHEMATICS</td>
</tr>

<tr>
<td>3</td>
<td>160564</td>
<td>2111748215</td>
<td>2024-25</td>
<td>FARIHA</td>
<td>SCIENCE</td>
<td>HIGHER MATHEMATICS</td>
</tr>

</table>

<script>
function searchTable() {
    let input = document.getElementById("searchBox").value.toLowerCase();
    let table = document.getElementById("studentTable");
    let rows = table.getElementsByTagName("tr");

    for (let i = 1; i < rows.length; i++) {
        let reg = rows[i].getElementsByTagName("td")[2];

        if (reg) {
            let text = reg.textContent || reg.innerText;
            rows[i].style.display = text.indexOf(input) > -1 ? "" : "none";
        }
    }
}
</script>

</body>
</html>
