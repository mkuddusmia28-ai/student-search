<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Student Live Search</title>

<style>
body{
    font-family: Arial;
    background:#eef4ff;
    margin:0;
}

.container{
    max-width:520px;
    margin:50px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 12px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#1565c0;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:8px;
}

.card{
    margin-top:20px;
    background:#f5f9ff;
    padding:15px;
    border-left:5px solid #1565c0;
    border-radius:8px;
}

.notfound{
    color:red;
    margin-top:15px;
    text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h2>🔍 Student Live Search</h2>

<input type="text" id="reg" placeholder="রেজিস্ট্রেশন নম্বর লিখুন">

<div id="result"></div>

</div>

<script>

let students = [];

const url = "https://raw.githubusercontent.com/mkuddusmia28-ai/student-search/main/students.csv";

// CSV load
fetch(url)
.then(res => res.text())
.then(data => {

    let rows = data.trim().split("\n");

    for(let i=1;i<rows.length;i++){

        let cols = rows[i].trim().split(/\s{2,}|\t|,/);

        students.push({
            sl: cols[0],
            roll: cols[1],
            reg: cols[3],
            name: cols[5],
            session: cols[4],
            group: cols[6],
            subject: cols[7],
            optional: cols[8]
        });
    }
});

// LIVE SEARCH
document.getElementById("reg").addEventListener("input", function(){

    let reg = this.value.trim();
    let result = document.getElementById("result");

    if(reg === ""){
        result.innerHTML = "";
        return;
    }

    let found = students.find(s => s.reg === reg);

    if(found){
        result.innerHTML = `
        <div class="card">
            <p><b>SL:</b> ${found.sl}</p>
            <p><b>ROLL:</b> ${found.roll}</p>
            <p><b>REG NO:</b> ${found.reg}</p>
            <p><b>NAME:</b> ${found.name}</p>
            <p><b>SESSION:</b> ${found.session}</p>
            <p><b>GROUP:</b> ${found.group}</p>
            <p><b>SUBJECT:</b> ${found.subject}</p>
            <p><b>OPTIONAL:</b> ${found.optional}</p>
        </div>`;
    }
    else{
        result.innerHTML = `<div class="notfound">❌ তথ্য পাওয়া যায়নি</div>`;
    }
});

</script>

</body>
</html>
