<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Student Search System</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    padding:20px;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    font-size:16px;
    margin-bottom:15px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    font-size:14px;
    text-align:left;
}

th{
    background:#007bff;
    color:white;
}
</style>
</head>

<body>

<h2>Student Search System</h2>

<input type="text" id="search" placeholder="নাম / রোল / রেজি দিয়ে সার্চ করুন...">

<table>
<thead>
<tr>
<th>Roll</th>
<th>Reg No</th>
<th>Name</th>
<th>Group</th>
<th>Session</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<script>

let students = [];

const url = "https://raw.githubusercontent.com/mkuddusmia28-ai/student-search/refs/heads/main/students.csv";

fetch(url)
.then(res => res.text())
.then(data => {
    parseCSV(data);
    renderTable(students);
});

function parseCSV(data){
    let lines = data.split("\n");

    for(let i=1;i<lines.length;i++){
        let line = lines[i].replace(/\r/g,'').trim();
        if(!line) continue;

        let cols = line.split(",");

        if(cols.length < 6) continue;

        let roll = cols[1] ? cols[1].replace(/\n/g,' ').replace(/\(F\)|\(M\)/,'').trim() : "";
        let reg = cols[2] || "";
        let session = cols[3] || "";
        let name = cols[4] || "";
        let group = cols[5] || "";

        students.push({
            roll,
            reg,
            session,
            name,
            group
        });
    }
}

function renderTable(data){
    let html = "";

    data.forEach(s=>{
        html += `
        <tr>
            <td>${s.roll}</td>
            <td>${s.reg}</td>
            <td>${s.name}</td>
            <td>${s.group}</td>
            <td>${s.session}</td>
        </tr>`;
    });

    document.getElementById("tableBody").innerHTML = html;
}

document.getElementById("search").addEventListener("input", function(){
    let val = this.value.toLowerCase();

    let filtered = students.filter(s =>
        (s.roll || "").toLowerCase().includes(val) ||
        (s.reg || "").toLowerCase().includes(val) ||
        (s.name || "").toLowerCase().includes(val)
    );

    renderTable(filtered);
});

</script>

</body>
</html>
